<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Pterodactyl Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-white">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-20 right-0 h-72 w-72 rounded-full bg-cyan-500/10 blur-3xl"></div>
    <div class="absolute bottom-0 left-0 h-72 w-72 rounded-full bg-emerald-500/10 blur-3xl"></div>
  </div>

  <main class="relative flex min-h-screen items-center justify-center px-4">
    <div class="w-full max-w-md rounded-3xl border border-slate-800 bg-slate-900/80 p-8 shadow-2xl shadow-slate-950/40 backdrop-blur">
      <div class="text-center">
        <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-cyan-500/10 text-cyan-300">⚙</div>
        <h1 class="mt-4 text-3xl font-semibold">Pterodactyl Dashboard</h1>
        <p class="mt-2 text-sm text-slate-400">Choose how you want to sign in</p>
      </div>
      <div class="mt-8 space-y-3">
        <a href="/auth/discord" class="flex items-center justify-center gap-3 rounded-xl bg-[#5865F2] px-4 py-3 font-medium text-white transition hover:bg-[#4752c4]">
          <span>Login with Discord</span>
        </a>
        <a href="/auth/github" class="flex items-center justify-center gap-3 rounded-xl bg-slate-100 px-4 py-3 font-medium text-slate-900 transition hover:bg-white">
          <span>Login with GitHub</span>
        </a>
      </div>
    </div>
  </main>
</body>
</html>
