<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickey Host - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #0b0f19 100%);
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.15);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <div class="glass-card rounded-2xl p-8 max-w-md w-full mx-4">
        <div class="text-center mb-6">
            <div class="text-5xl mb-3">⚡</div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-[#00ffcc] to-[#00b894] bg-clip-text text-transparent">Mickey Host</h1>
            <p class="text-gray-400 text-sm mt-2">Ingia kwenye Dashboard yako</p>
        </div>
        
        <form id="login-form" class="space-y-4">
            <div>
                <input type="email" id="email" placeholder="Barua pepe" 
                       class="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg focus:border-[#00ffcc] focus:outline-none text-white">
            </div>
            <div>
                <input type="password" id="password" placeholder="Nenosiri" 
                       class="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg focus:border-[#00ffcc] focus:outline-none text-white">
            </div>
            <button type="submit" 
                    class="w-full py-3 bg-gradient-to-r from-[#00ffcc] to-[#00b894] text-[#0a0e1a] font-bold rounded-lg transition hover:scale-[1.02]">
                INGIA
            </button>
        </form>
        
        <p class="text-center text-xs text-gray-500 mt-4">
            Jaza barua pepe na nenosiri lako ili kuingia kwenye dashboard yako.
        </p>

        <div class="text-center mt-4">
            <a href="#" onclick="showSignup()" class="text-[#00ffcc] text-sm hover:underline">🔐 Tengeneza Akaunti Mpya</a>
        </div>
    </div>
    
    <!-- Signup Modal -->
    <div id="signup-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="glass-card rounded-2xl p-8 max-w-md w-full mx-4">
            <h2 class="text-xl font-bold text-white mb-4">Tengeneza Akaunti</h2>
            <form id="signup-form" class="space-y-4">
                <input type="text" id="signup-name" placeholder="Jina Kamili" required 
                       class="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg focus:border-[#00ffcc] focus:outline-none text-white">
                <input type="email" id="signup-email" placeholder="Barua pepe" required 
                       class="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg focus:border-[#00ffcc] focus:outline-none text-white">
                <input type="password" id="signup-password" placeholder="Nenosiri (min 6)" required 
                       class="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg focus:border-[#00ffcc] focus:outline-none text-white">
                <button type="submit" class="w-full py-3 bg-[#00ffcc] text-[#0a0e1a] font-bold rounded-lg">
                    TENGENEZA AKAUNTI
                </button>
                <button type="button" onclick="hideSignup()" class="w-full py-2 text-gray-400 text-sm">Funga</button>
            </form>
        </div>
    </div>

    <script>

        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('mickey_token', data.token);
                    localStorage.setItem('mickey_user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (err) {
                alert('Server error');
            }
        });
        
        async function showSignup() {
            document.getElementById('signup-modal').classList.remove('hidden');
        }
        
        function hideSignup() {
            document.getElementById('signup-modal').classList.add('hidden');
        }
        
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            
            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                alert(data.message);
                if (data.success) {
                    hideSignup();
                    document.getElementById('email').value = email;
                    document.getElementById('password').value = password;
                }
            } catch (err) {
                alert('Signup error');
            }
        });
        
        // Check if already logged in
        const token = localStorage.getItem('mickey_token');
        if (token) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
