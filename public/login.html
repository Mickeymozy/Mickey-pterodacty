<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MickeyPanel - Ingia</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(18, 20, 28, 0.92); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.06); }
    .gradient-text { background: linear-gradient(135deg, #818cf8, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tab-btn { transition: all 0.3s ease; }
    .tab-btn.active { background: #6366f1; color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
    .input-field { transition: all 0.3s ease; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.06); }
    .input-field:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
    .submit-btn { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.3s ease; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4); }
    .github-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); transition: all 0.3s ease; }
    .github-btn:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body class="min-h-screen bg-[#0a0c12] flex items-center justify-center p-4">

  <div class="fixed inset-0 pointer-events-none">
    <div class="absolute top-[-20%] right-[-10%] w-[500px] h-[500px] rounded-full bg-indigo-600/10 blur-3xl"></div>
    <div class="absolute bottom-[-20%] left-[-10%] w-[500px] h-[500px] rounded-full bg-purple-600/10 blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-[440px] glass rounded-2xl p-8 shadow-2xl shadow-black/60">

    <div class="text-center mb-8">
      <h1 class="text-4xl font-extrabold gradient-text">MickeyPanel</h1>
      <p class="text-slate-400 text-sm mt-1">Manage your servers with ease</p>
    </div>

    <div id="alert-box" class="hidden p-3 rounded-xl text-sm font-medium mb-5"></div>

    <div class="flex gap-1 bg-black/30 p-1 rounded-xl mb-6">
      <button class="tab-btn flex-1 py-2.5 rounded-lg text-sm font-semibold text-slate-400 active" onclick="switchTab('login')">Ingia</button>
      <button class="tab-btn flex-1 py-2.5 rounded-lg text-sm font-semibold text-slate-400" onclick="switchTab('register')">Sajili</button>
      <button class="tab-btn flex-1 py-2.5 rounded-lg text-sm font-semibold text-slate-400" onclick="switchTab('reset')">Reset</button>
    </div>

    <div id="login-tab" class="tab-content">
      <form action="/auth/login" method="POST" class="space-y-4">
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Username au Email</label>
          <input type="text" name="username" required autocomplete="username" placeholder="Ingiza username au email"
                 class="input-field w-full px-4 py-3 rounded-xl text-white text-sm outline-none" />
        </div>
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Password</label>
          <input type="password" name="password" required autocomplete="current-password" placeholder="Ingiza password yako"
                 class="input-field w-full px-4 py-3 rounded-xl text-white text-sm outline-none" />
        </div>
        <button type="submit" class="submit-btn w-full py-3.5 rounded-xl text-white font-semibold text-sm">Ingia Sasa</button>
      </form>

      <div class="mt-4">
        <a href="/auth/github" class="github-btn flex items-center justify-center gap-2 w-full py-3 rounded-xl text-sm font-semibold text-white">
          <span>⚡</span>
          <span>Ingia na GitHub</span>
        </a>
      </div>

    </div>

    <div id="register-tab" class="tab-content hidden">
      <form action="/auth/register" method="POST" class="space-y-3">
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Username</label>
          <input type="text" name="username" required autocomplete="username" placeholder="Chagua jina la mtumiaji"
                 class="input-field w-full px-4 py-3 rounded-xl text-white text-sm outline-none" />
        </div>
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Barua Pepe (Email)</label>
          <input type="email" name="email" required autocomplete="email" placeholder="mfano@gmail.com"
                 class="input-field w-full px-4 py-3 rounded-xl text-white text-sm outline-none" />
        </div>
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Jina Kamili</label>
          <input type="text" name="first_name" placeholder="Jina lako la kwanza"
                 class="input-field w-full px-4 py-3 rounded-xl text-white text-sm outline-none" />
        </div>
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Password</label>
          <input type="password" id="registerPassword" name="password" required autocomplete="new-password" placeholder="Weka password ngumu"
                 class="input-field w-full px-4 py-3 rounded-xl text-white text-sm outline-none" />
        </div>
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Rudia Password (Confirm Password)</label>
          <input type="password" id="confirmRegisterPassword" name="confirmPassword" required autocomplete="new-password" placeholder="Rudia password yako tena"
                 class="input-field w-full px-4 py-3 rounded-xl text-white text-sm outline-none" />
          <p class="mt-1 text-[11px] text-slate-500">Password lazima iwe na angalau herufi 8, herufi kubwa, herufi ndogo, alama maalum na namba 4.</p>
        </div>
        <button type="submit" class="submit-btn w-full py-3.5 rounded-xl text-white font-semibold text-sm">Fungua Akaunti</button>
      </form>
    </div>

    <div id="reset-tab" class="tab-content hidden">
      <form action="/auth/reset-password" method="POST" class="space-y-4">
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Barua Pepe Yako</label>
          <input type="email" name="email" required placeholder="Weka email uliyosajilia"
                 class="input-field w-full px-4 py-3 rounded-xl text-white text-sm outline-none" />
        </div>
        <button type="submit" class="submit-btn w-full py-3.5 rounded-xl text-white font-semibold text-sm">Tuma Maelezo</button>
      </form>

      <form action="/auth/reset-password/confirm" method="POST" class="space-y-3 mt-4">
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Token ya Reset</label>
          <input id="resetTokenInput" type="text" name="token" placeholder="Bandika token uliyopewa kwa email"
                 class="input-field w-full px-4 py-3 rounded-xl text-white text-sm outline-none" />
        </div>
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Password Mpya</label>
          <input type="password" id="resetPassword" name="password" required autocomplete="new-password" placeholder="Weka password mpya"
                 class="input-field w-full px-4 py-3 rounded-xl text-white text-sm outline-none" />
          <p class="mt-1 text-[11px] text-slate-500">Usitumie password rahisi au iliyoenea.</p>
        </div>
        <button type="submit" class="submit-btn w-full py-3.5 rounded-xl text-white font-semibold text-sm">Badilisha Password</button>
      </form>
      <p class="text-center text-slate-500 text-xs mt-4">Tutakutumia maelezo ya kubadili password</p>
    </div>

    <p class="text-center text-slate-500 text-xs mt-6">© 2026 MickeyPanel</p>
  </div>

  <script>
    const alertBox = document.getElementById('alert-box');

    function validatePasswordStrength(password) {
      const trimmed = String(password || '').trim();
      const digitCount = (trimmed.match(/\d/g) || []).length;
      return trimmed.length >= 8 && digitCount >= 4;
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));

      // Fixed: logic to handle lowercase string matching for classes
      const btn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.textContent.trim().toLowerCase() === (tab === 'login' ? 'ingia' : tab === 'register' ? 'sajili' : 'reset'));
      if (btn) btn.classList.add('active');

      document.getElementById(`${tab}-tab`).classList.remove('hidden');
    }

    async function checkAlerts() {
      try {
        const res = await fetch('/api/auth/flash');
        const data = await res.json();

        if (data.error?.length || data.success?.length) {
          alertBox.classList.remove('hidden');
          const isError = data.error?.length > 0;
          alertBox.className = `p-3 rounded-xl text-sm font-medium mb-5 ${isError ? 'bg-red-500/15 text-red-400 border border-red-500/20' : 'bg-emerald-500/15 text-emerald-400 border border-emerald-500/20'}`;
          alertBox.textContent = isError ? data.error[0] : data.success[0];

          setTimeout(() => { alertBox.classList.add('hidden'); }, 5000);
        }
      } catch (e) { console.log(e); }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const tab = urlParams.get('tab');
    const token = urlParams.get('token');
    if (tab) switchTab(tab);

    if (token) {
      const tokenInput = document.getElementById('resetTokenInput');
      if (tokenInput) tokenInput.value = token;
      switchTab('reset');
    }

    if (urlParams.get('error')) {
      alertBox.classList.remove('hidden');
      alertBox.className = 'p-3 rounded-xl text-sm font-medium mb-5 bg-red-500/15 text-red-400 border border-red-500/20';
      alertBox.textContent = '❌ Username au password sio sahihi. Jaribu tena.';
    }

    document.getElementById('registerPassword')?.addEventListener('input', (e) => {
      if (!validatePasswordStrength(e.target.value) && e.target.value.length > 0) {
        e.target.setAttribute('title', 'Password lazima iwe na angalau herufi 8 na namba 4');
      } else {
        e.target.removeAttribute('title');
      }
    });

    document.getElementById('resetPassword')?.addEventListener('input', (e) => {
      if (!validatePasswordStrength(e.target.value) && e.target.value.length > 0) {
        e.target.setAttribute('title', 'Password lazima iwe na angalau herufi 8 na namba 4');
      } else {
        e.target.removeAttribute('title');
      }
    });

    checkAlerts();
  </script>

</body>
</html>
