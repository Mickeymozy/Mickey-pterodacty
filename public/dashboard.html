<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: Inter, sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
  </style>
</head>
<body class="min-h-screen bg-[#0a0a14] text-slate-50">
  <div class="mx-auto max-w-7xl px-4 py-6">
    <!-- Top Nav -->
    <header class="glass rounded-2xl p-6 mb-6 flex justify-between items-center">
      <div>
        <h1 class="text-xl font-bold">Dashboard ya Mtumiaji</h1>
        <p class="text-xs text-slate-400">Simamia server zako hapa</p>
      </div>
      <div class="flex items-center gap-4">
        <div class="bg-indigo-600/20 text-indigo-400 px-3 py-1.5 rounded-xl border border-indigo-500/30 font-semibold text-sm">
          Salio: <span id="userCoins">0</span> Coins
        </div>
        <a href="/logout" class="text-xs bg-red-500/10 text-red-400 px-3 py-2 rounded-lg border border-red-500/20">Ondoka</a>
      </div>
    </header>

    <!-- Main Content -->
    <div class="grid gap-6 lg:grid-cols-3">
      <!-- Live Server Management Panel (Kushoto) -->
      <div class="lg:col-span-2 space-y-6">
        <div class="glass rounded-2xl p-6">
          <h2 class="text-lg font-bold mb-4 flex items-center gap-2">🎮 Server Zako Zilizopo</h2>
          
          <div id="serversContainer" class="space-y-4">
            <!-- Loader au Mfumo wa kusoma server utatokea hapa -->
            <p class="text-xs text-slate-400">Inatafuta server zako kutoka kwenye mfumo...</p>
          </div>
        </div>
      </div>

      <!-- Nunua Coins / Package (Kulia) -->
      <div class="space-y-6">
        <div class="glass rounded-2xl p-6">
          <h2 class="text-md font-bold mb-3">🪙 Nunua Coins kwa Tsh</h2>
          <p class="text-xs text-slate-400 mb-4">Gharama: Coin 1 = Tsh 250</p>
          <div class="space-y-2">
            <button onclick="requestCoins(100)" class="w-full bg-slate-800 text-xs p-2.5 rounded-xl text-left hover:bg-slate-700 transition flex justify-between">
              <span>🪙 100 Coins</span> <span class="text-emerald-400 font-bold">Tsh 25,000</span>
            </button>
            <button onclick="requestCoins(200)" class="w-full bg-slate-800 text-xs p-2.5 rounded-xl text-left hover:bg-slate-700 transition flex justify-between">
              <span>🪙 200 Coins</span> <span class="text-emerald-400 font-bold">Tsh 50,000</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api';

    // 1. Kusoma data za User & Coins zake
    async function fetchUserData() {
      try {
        const res = await fetch(`${API_URL}/user/profile`);
        const d = await res.json();
        if(d.success) {
          document.getElementById('userCoins').textContent = d.data.coins || 0;
        }
      } catch(e) { console.error("Imeshindwa kusoma profile:", e); }
    }

    // 2. KUSOMA NA KUWEKA MBRE YA CONTROL ZA SERVER
    async function fetchUserServers() {
      const container = document.getElementById('serversContainer');
      try {
        const res = await fetch(`${API_URL}/servers/my-servers`);
        const d = await res.json();
        
        if(!d.success || !d.data || d.data.length === 0) {
          container.innerHTML = `<p class="text-xs text-slate-500 p-4 text-center bg-slate-900/30 rounded-xl">Hauna server yoyote inayofanya kazi kwa sasa.</p>`;
          return;
        }

        container.innerHTML = d.data.map(srv => {
          // Kutofautisha rangi ya hali ya server (Online/Offline)
          const isOnline = srv.status === 'running' || srv.status === 'online';
          const statusBg = isOnline ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400';
          
          return `
            <div class="glass p-5 rounded-xl border border-slate-800 flex flex-col md:flex-row justify-between gap-4">
              <div class="space-y-2">
                <div class="flex items-center gap-2">
                  <h3 class="font-bold text-white text-md">${srv.name}</h3>
                  <span class="text-[10px] px-2 py-0.5 rounded font-semibold uppercase ${statusBg}">${srv.status || 'Offline'}</span>
                </div>
                <p class="text-xs text-indigo-300 font-mono">${srv.ipAddress || '127.0.0.1'}:${srv.port || '25565'}</p>
                <div class="flex gap-4 text-[11px] text-slate-400 pt-2">
                  <div>💾 RAM: <span class="text-slate-200">${srv.ramUsage || 0} / ${srv.ramLimit || 2048} MB</span></div>
                  <div>⚙️ CPU: <span class="text-slate-200">${srv.cpuUsage || 0}%</span></div>
                </div>
              </div>
              
              <!-- Sehemu ya Vitufe vya Kudhibiti Mfumo wa Server (Power Actions) -->
              <div class="flex items-center gap-2 self-end md:self-center">
                <button onclick="controlServer('${srv._id || srv.id}', 'start')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs px-3 py-2 rounded-lg transition">START</button>
                <button onclick="controlServer('${srv._id || srv.id}', 'restart')" class="bg-amber-600 hover:bg-amber-700 text-white font-bold text-xs px-3 py-2 rounded-lg transition">RESTART</button>
                <button onclick="controlServer('${srv._id || srv.id}', 'stop')" class="bg-red-600 hover:bg-red-700 text-white font-bold text-xs px-3 py-2 rounded-lg transition">STOP</button>
              </div>
            </div>
          `;
        }).join('');

      } catch(e) {
        console.error(e);
        container.innerHTML = `<p class="text-xs text-red-400 p-4 text-center">Itifaki imefeli kuwasiliana na Node/Pterodactyl backend.</p>`;
      }
    }

    // 3. KITUFE CHA KUPIGA KAZI CONTROL (Start/Stop/Restart)
    async function controlServer(serverId, action) {
      try {
        // Inatuma ombi la kubadilisha power state ya server
        const res = await fetch(`${API_URL}/servers/${serverId}/power`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: action }) // mfano: 'start', 'stop', 'restart'
        });
        const d = await res.json();
        if(d.success) {
          alert(`Ombi la server kufanya ${action.toUpperCase()} limefanikiwa!`);
          fetchUserServers(); // Kurefresh kupata status mpya
        } else {
          alert("Imeshindwa kudhibiti server: " + d.message);
        }
      } catch(e) {
        alert("Hitilafu kwenye mfumo wa mawasiliano ya API.");
      }
    }

    async function requestCoins(amount) {
      alert(`Tafadhali tuma malipo ya Tsh ${Number(amount * 250).toLocaleString()} kwenda namba ya admin na uweke muamala wako kwenye mfumo.`);
    }

    // Kuchochea mfumo uanze kusoma upya
    fetchUserData();
    fetchUserServers();
    // Kurefresh kila baada ya sekunde 10 ili matumizi ya CPU/RAM yasomeke mubashara (Live)
    setInterval(fetchUserServers, 10000);
  </script>
</body>
</html>
