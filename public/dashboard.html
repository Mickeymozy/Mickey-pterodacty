<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-50">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-24 right-0 h-72 w-72 rounded-full bg-cyan-500/10 blur-3xl"></div>
    <div class="absolute top-1/3 left-0 h-64 w-64 rounded-full bg-emerald-500/10 blur-3xl"></div>
  </div>

  <div class="relative mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
    <header class="rounded-3xl border border-slate-800 bg-slate-900/80 p-6 shadow-2xl shadow-slate-950/30 backdrop-blur">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <p class="text-sm text-slate-400">Welcome back</p>
          <h1 id="userName" class="mt-1 text-2xl font-semibold text-white">Loading...</h1>
        </div>
        <a href="/logout" class="inline-flex items-center justify-center rounded-xl border border-slate-700 px-4 py-2.5 text-sm font-medium text-slate-200 transition hover:bg-slate-800">Logout</a>
      </div>
    </header>

    <section class="mt-6 grid gap-4 sm:grid-cols-3">
      <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-5">
        <p class="text-sm text-slate-400">Total Servers</p>
        <h2 id="totalServers" class="mt-2 text-3xl font-semibold">0</h2>
      </div>
      <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-5">
        <p class="text-sm text-slate-400">Running</p>
        <h2 id="runningServers" class="mt-2 text-3xl font-semibold text-emerald-400">0</h2>
      </div>
      <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-5">
        <p class="text-sm text-slate-400">Stopped</p>
        <h2 id="stoppedServers" class="mt-2 text-3xl font-semibold text-amber-400">0</h2>
      </div>
    </section>

    <section class="mt-8 grid gap-6 xl:grid-cols-[1.8fr_1fr]">
      <div class="rounded-3xl border border-slate-800 bg-slate-900/80 p-6 shadow-xl shadow-slate-950/20">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-slate-400">Manage</p>
            <h2 class="text-2xl font-semibold">Your Servers</h2>
          </div>
          <button id="refreshBtn" class="rounded-xl bg-emerald-600 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-emerald-500">Refresh</button>
        </div>
        <div id="serverList" class="mt-6 space-y-4"></div>
      </div>

      <div class="rounded-3xl border border-slate-800 bg-slate-900/80 p-6 shadow-xl shadow-slate-950/20">
        <div>
          <p class="text-sm text-slate-400">Create</p>
          <h2 class="text-2xl font-semibold">New Server</h2>
        </div>
        <form id="createForm" class="mt-5 space-y-4">
          <div>
            <label for="serverName" class="mb-1 block text-sm font-medium text-slate-300">Server Name</label>
            <input id="serverName" required placeholder="e.g. My App Server" class="w-full rounded-xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-sm outline-none transition focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500" />
          </div>

          <div>
            <label for="egg" class="mb-1 block text-sm font-medium text-slate-300">Server Type</label>
            <select id="egg" class="w-full rounded-xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-sm outline-none transition focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500">
              <option value="16">Node.js</option>
              <option value="27">Python</option>
              <option value="28">Java</option>
            </select>
          </div>

          <div class="grid gap-4 sm:grid-cols-3">
            <div>
              <label for="cpu" class="mb-1 block text-sm font-medium text-slate-300">CPU</label>
              <input id="cpu" type="number" min="50" value="100" class="w-full rounded-xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-sm outline-none transition focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500" />
              <p class="mt-1 text-xs text-slate-500">vCores / Threads</p>
            </div>
            <div>
              <label for="memory" class="mb-1 block text-sm font-medium text-slate-300">RAM</label>
              <input id="memory" type="number" min="512" value="1024" class="w-full rounded-xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-sm outline-none transition focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500" />
              <p class="mt-1 text-xs text-slate-500">MB</p>
            </div>
            <div>
              <label for="disk" class="mb-1 block text-sm font-medium text-slate-300">Disk</label>
              <input id="disk" type="number" min="1024" value="2048" class="w-full rounded-xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-sm outline-none transition focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500" />
              <p class="mt-1 text-xs text-slate-500">MB</p>
            </div>
          </div>

          <button class="w-full rounded-xl bg-cyan-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-cyan-500">Create Server</button>
        </form>
        <p id="formMessage" class="mt-3 text-sm text-slate-400"></p>
      </div>
    </section>
  </div>

  <script>
    const serverList = document.getElementById('serverList');
    const userName = document.getElementById('userName');
    const createForm = document.getElementById('createForm');
    const formMessage = document.getElementById('formMessage');
    const totalServers = document.getElementById('totalServers');
    const runningServers = document.getElementById('runningServers');
    const stoppedServers = document.getElementById('stoppedServers');

    async function loadUser() {
      const res = await fetch('/api/me');
      const data = await res.json();
      userName.textContent = data.user.displayName || data.user.username;
    }

    async function loadServers() {
      const res = await fetch('/api/servers');
      const data = await res.json();
      const servers = data.servers || [];

      totalServers.textContent = servers.length;
      runningServers.textContent = servers.filter(s => s.status === 'running').length;
      stoppedServers.textContent = servers.filter(s => s.status !== 'running').length;

      if (!servers.length) {
        serverList.innerHTML = `
          <div class="rounded-2xl border border-dashed border-slate-700 bg-slate-950/40 p-10 text-center">
            <h3 class="text-lg font-semibold">No servers yet</h3>
            <p class="mt-1 text-sm text-slate-400">Create a new server using the form on the right.</p>
          </div>
        `;
        return;
      }

      serverList.innerHTML = servers.map(server => `
        <div class="rounded-2xl border border-slate-800 bg-slate-950/70 p-5">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div>
              <div class="flex items-center gap-2">
                <h3 class="text-lg font-semibold">${server.name}</h3>
                <span class="rounded-full px-2.5 py-1 text-[11px] font-medium ${server.status === 'running' ? 'bg-emerald-500/15 text-emerald-300' : 'bg-amber-500/15 text-amber-300'}">${server.status}</span>
              </div>
              <p class="mt-1 text-sm text-slate-400">Server ID: ${server.identifier}</p>
            </div>
            <div class="flex gap-2">
              <button data-action="start" data-id="${server.identifier}" class="rounded-xl bg-emerald-600 px-3 py-2 text-sm font-medium text-white hover:bg-emerald-500">Start</button>
              <button data-action="stop" data-id="${server.identifier}" class="rounded-xl bg-amber-600 px-3 py-2 text-sm font-medium text-white hover:bg-amber-500">Stop</button>
              <button data-action="restart" data-id="${server.identifier}" class="rounded-xl bg-sky-600 px-3 py-2 text-sm font-medium text-white hover:bg-sky-500">Restart</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    serverList.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const signal = btn.dataset.action;
      const id = btn.dataset.id;
      const res = await fetch(`/api/servers/${id}/power/${signal}`, { method: 'POST' });
      const data = await res.json();
      if (data.success) {
        await loadServers();
      }
    });

    createForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      formMessage.textContent = 'Creating server...';
      const payload = {
        name: document.getElementById('serverName').value,
        egg: Number(document.getElementById('egg').value),
        cpu: Number(document.getElementById('cpu').value),
        memory: Number(document.getElementById('memory').value),
        disk: Number(document.getElementById('disk').value),
        startupCommand: 'npm start'
      };
      const res = await fetch('/api/servers/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      formMessage.textContent = data.success ? 'Server created successfully.' : data.error || 'Failed to create server.';
      if (data.success) {
        createForm.reset();
        await loadServers();
      }
    });

    document.getElementById('refreshBtn').addEventListener('click', () => {
      loadUser();
      loadServers();
    });

    loadUser();
    loadServers();
  </script>
</body>
</html>
