<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PteroPanel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #818cf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .server-card {
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .server-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-running {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        
        .status-stopped {
            background: rgba(251, 191, 36, 0.15);
            color: #fcd34d;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }
        
        .status-installing {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .input-glass {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }
        
        .input-glass:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: rgba(0, 0, 0, 0.5);
        }
        
        .scrollbar-thin::-webkit-scrollbar {
            width: 4px;
        }
        
        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
        }
    </style>
</head>
<body class="min-h-screen bg-[#0a0a14] text-slate-50">

<!-- Background Effects -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 h-96 w-96 rounded-full bg-purple-500/10 blur-3xl"></div>
    <div class="absolute top-1/2 -left-40 h-96 w-96 rounded-full bg-indigo-500/10 blur-3xl"></div>
    <div class="absolute bottom-0 right-0 h-72 w-72 rounded-full bg-blue-500/10 blur-3xl"></div>
</div>

<div class="relative mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
    
    <!-- Header -->
    <header class="glass rounded-2xl p-6 mb-6">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <p class="text-sm text-slate-400 font-medium">Welcome back</p>
                <h1 id="userName" class="mt-1 text-2xl font-bold text-white">
                    <span class="inline-block w-24 h-6 bg-slate-700/50 rounded animate-pulse"></span>
                </h1>
                <p id="panelStatus" class="mt-1 text-sm text-slate-400">Checking panel connection...</p>
            </div>
            <div class="flex items-center gap-3">
                <button id="refreshBtn" class="px-4 py-2.5 rounded-xl bg-slate-800/50 text-sm font-medium text-slate-300 hover:bg-slate-700/50 transition border border-slate-700/50">
                    🔄 Refresh
                </button>
                <a href="/logout" class="px-4 py-2.5 rounded-xl bg-red-500/10 text-sm font-medium text-red-400 hover:bg-red-500/20 transition border border-red-500/20">
                    Logout
                </a>
            </div>
        </div>
    </header>

    <!-- Stats -->
    <section class="grid gap-4 sm:grid-cols-3 mb-6">
        <div class="glass rounded-2xl p-5">
            <p class="text-sm text-slate-400 font-medium">Total Servers</p>
            <h2 id="totalServers" class="mt-2 text-3xl font-bold text-white">0</h2>
        </div>
        <div class="glass rounded-2xl p-5">
            <p class="text-sm text-slate-400 font-medium">Running</p>
            <h2 id="runningServers" class="mt-2 text-3xl font-bold text-emerald-400">0</h2>
        </div>
        <div class="glass rounded-2xl p-5">
            <p class="text-sm text-slate-400 font-medium">Stopped</p>
            <h2 id="stoppedServers" class="mt-2 text-3xl font-bold text-amber-400">0</h2>
        </div>
    </section>

    <!-- Main Content -->
    <section class="grid gap-6 lg:grid-cols-[1.8fr_1fr]">
        
        <!-- Server List -->
        <div class="glass rounded-2xl p-6">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <p class="text-sm text-slate-400 font-medium">Manage</p>
                    <h2 class="text-2xl font-bold text-white">Your Servers</h2>
                </div>
            </div>
            <div id="serverList" class="space-y-4 max-h-[500px] overflow-y-auto scrollbar-thin pr-2">
                <!-- Rendered by JavaScript -->
            </div>
        </div>

        <!-- Create Server -->
        <div class="glass rounded-2xl p-6">
            <div>
                <p class="text-sm text-slate-400 font-medium">Create</p>
                <h2 class="text-2xl font-bold text-white">New Server</h2>
            </div>
            
            <form id="createForm" class="mt-5 space-y-4">
                <div>
                    <label for="serverName" class="mb-1.5 block text-sm font-medium text-slate-300">Server Name</label>
                    <input id="serverName" required placeholder="e.g. My App" 
                           class="w-full rounded-xl input-glass px-4 py-3 text-sm outline-none text-white">
                </div>

                <div>
                    <label for="egg" class="mb-1.5 block text-sm font-medium text-slate-300">Server Type</label>
                    <select id="egg" class="w-full rounded-xl input-glass px-4 py-3 text-sm outline-none text-white">
                        <option value="" class="bg-slate-900">Loading server types...</option>
                    </select>
                </div>

                <div class="grid gap-3 sm:grid-cols-2">
                    <div>
                        <label for="startupFile" id="startupFileLabel" class="mb-1.5 block text-sm font-medium text-slate-300">Main File</label>
                        <input id="startupFile" placeholder="index.js"
                               class="w-full rounded-xl input-glass px-4 py-3 text-sm outline-none text-white">
                    </div>
                    <div>
                        <label for="startupCommand" class="mb-1.5 block text-sm font-medium text-slate-300">Startup Command</label>
                        <input id="startupCommand" placeholder="npm start"
                               class="w-full rounded-xl input-glass px-4 py-3 text-sm outline-none text-white">
                    </div>
                </div>
                <p id="eggHint" class="text-xs text-slate-500">The panel needs the startup file for this egg. For Node.js, use something like index.js.</p>

                <div class="grid gap-3 sm:grid-cols-3">
                    <div>
                        <label for="cpu" class="mb-1.5 block text-sm font-medium text-slate-300">CPU</label>
                        <input id="cpu" type="number" min="1" max="25" value="25" 
                               class="w-full rounded-xl input-glass px-4 py-3 text-sm outline-none text-white">
                        <p class="mt-1 text-xs text-slate-500">vCores</p>
                    </div>
                    <div>
                        <label for="memory" class="mb-1.5 block text-sm font-medium text-slate-300">RAM</label>
                        <input id="memory" type="number" min="512" value="1024" 
                               class="w-full rounded-xl input-glass px-4 py-3 text-sm outline-none text-white">
                        <p class="mt-1 text-xs text-slate-500">MB</p>
                    </div>
                    <div>
                        <label for="disk" class="mb-1.5 block text-sm font-medium text-slate-300">Disk</label>
                        <input id="disk" type="number" min="1024" value="2048" 
                               class="w-full rounded-xl input-glass px-4 py-3 text-sm outline-none text-white">
                        <p class="mt-1 text-xs text-slate-500">MB</p>
                    </div>
                </div>

                <button type="submit" class="w-full btn-primary rounded-xl px-4 py-3 text-sm font-semibold text-white">
                    🚀 Create Server
                </button>
            </form>
            <p id="formMessage" class="mt-3 text-sm text-slate-400"></p>
        </div>
        
    </section>
</div>

<script>
    const serverList = document.getElementById('serverList');
    const userName = document.getElementById('userName');
    const panelStatus = document.getElementById('panelStatus');
    const createForm = document.getElementById('createForm');
    const formMessage = document.getElementById('formMessage');
    const totalServers = document.getElementById('totalServers');
    const runningServers = document.getElementById('runningServers');
    const stoppedServers = document.getElementById('stoppedServers');
    const eggSelect = document.getElementById('egg');
    const startupFileInput = document.getElementById('startupFile');
    const startupCommandInput = document.getElementById('startupCommand');
    const startupFileLabel = document.getElementById('startupFileLabel');
    const eggHint = document.getElementById('eggHint');
    let linkedToPtero = false;

    function setFormDisabled(disabled) {
        createForm.querySelectorAll('input, select, button').forEach((el) => {
            el.disabled = disabled;
        });
    }

    async function loadUser() {
        try {
            const res = await fetch('/api/me');
            if (!res.ok) {
                window.location.href = '/login.html';
                return;
            }
            const data = await res.json();
            const user = data.user || {};
            userName.textContent = user.displayName || user.username || 'User';
            linkedToPtero = Boolean(user.linkedToPtero);

            if (linkedToPtero) {
                panelStatus.textContent = '✅ Pterodactyl account linked';
                panelStatus.className = 'mt-1 text-sm text-emerald-400';
                setFormDisabled(false);
            } else {
                panelStatus.textContent = '⚠️ Pterodactyl account not linked yet';
                panelStatus.className = 'mt-1 text-sm text-amber-400';
                setFormDisabled(true);
            }
        } catch (e) {
            window.location.href = '/login.html';
        }
    }

    function updateStartupHints() {
        const eggId = Number(eggSelect.value);
        let label = 'Main File';
        let placeholder = 'index.js';
        let hint = 'The panel needs the startup file for this egg. For Node.js, use something like index.js.';

        if (eggId === 27) {
            label = 'Python File';
            placeholder = 'main.py';
            hint = 'The panel needs the Python entry file for this egg.';
        } else if (eggId === 28) {
            label = 'Jar File';
            placeholder = 'server.jar';
            hint = 'The panel needs the Java jar file for this egg.';
        }

        startupFileLabel.textContent = label;
        startupFileInput.placeholder = placeholder;
        if (!startupFileInput.value) {
            startupFileInput.value = '';
        }
        eggHint.textContent = hint;
    }

    async function loadEggOptions() {
        try {
            const res = await fetch('/api/eggs');
            const data = await res.json().catch(() => ({}));
            if (!res.ok || !data.success) {
                throw new Error(data.error || 'Unable to load server types');
            }

            const eggs = Array.isArray(data.eggs) ? data.eggs : [];
            if (!eggs.length) {
                eggSelect.innerHTML = '<option value="" class="bg-slate-900">No server types available</option>';
                updateStartupHints();
                return;
            }

            eggSelect.innerHTML = eggs.map((egg) => `
                <option value="${egg.id}" class="bg-slate-900">${egg.name}</option>
            `).join('');
            updateStartupHints();
        } catch (e) {
            eggSelect.innerHTML = `
                <option value="" class="bg-slate-900">Server types unavailable</option>
            `;
            updateStartupHints();
        }
    }

    async function loadServers() {
        try {
            const res = await fetch('/api/servers');
            if (!res.ok) {
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/login.html';
                    return;
                }
                const errData = await res.json().catch(() => ({}));
                if (errData.error) {
                    formMessage.textContent = '❌ ' + errData.error;
                    formMessage.className = 'mt-3 text-sm text-red-400';
                }
                throw new Error(errData.error || 'Unable to load servers');
            }
            const data = await res.json();
            const servers = data.servers || [];

            totalServers.textContent = servers.length;
            const running = servers.filter(s => s.status === 'running' || s.status === 'starting');
            const stopped = servers.filter(s => s.status === 'stopped' || s.status === 'offline');
            runningServers.textContent = running.length;
            stoppedServers.textContent = stopped.length;

            if (!servers.length) {
                serverList.innerHTML = `
                    <div class="rounded-2xl border border-dashed border-slate-700/50 bg-slate-800/20 p-10 text-center">
                        <div class="text-4xl mb-3">🪶</div>
                        <h3 class="text-lg font-semibold text-white">No servers yet</h3>
                        <p class="mt-1 text-sm text-slate-400">Create your first server using the form on the right.</p>
                    </div>
                `;
                return;
            }

            serverList.innerHTML = servers.map(server => {
                const statusClass = server.status === 'running' || server.status === 'starting' 
                    ? 'status-running' 
                    : server.status === 'installing' 
                        ? 'status-installing' 
                        : 'status-stopped';
                
                return `
                    <div class="server-card glass rounded-xl p-5">
                        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 flex-wrap">
                                    <h3 class="text-lg font-semibold text-white truncate">${server.name}</h3>
                                    <span class="status-badge ${statusClass}">${server.status || 'unknown'}</span>
                                </div>
                                <p class="mt-1 text-sm text-slate-400 font-mono">${server.identifier || server.id}</p>
                            </div>
                            <div class="flex gap-2 flex-wrap">
                                <button data-action="start" data-id="${server.uuid || server.id || server.identifier}" 
                                        class="px-3 py-2 rounded-xl bg-emerald-500/10 text-emerald-400 text-sm font-medium hover:bg-emerald-500/20 transition border border-emerald-500/20">
                                    ▶ Start
                                </button>
                                <button data-action="stop" data-id="${server.uuid || server.id || server.identifier}" 
                                        class="px-3 py-2 rounded-xl bg-amber-500/10 text-amber-400 text-sm font-medium hover:bg-amber-500/20 transition border border-amber-500/20">
                                    ⏹ Stop
                                </button>
                                <button data-action="restart" data-id="${server.uuid || server.id || server.identifier}" 
                                        class="px-3 py-2 rounded-xl bg-blue-500/10 text-blue-400 text-sm font-medium hover:bg-blue-500/20 transition border border-blue-500/20">
                                    🔄 Restart
                                </button>
                                <button data-action="delete" data-id="${server.uuid || server.id || server.identifier}" 
                                        class="px-3 py-2 rounded-xl bg-red-500/10 text-red-400 text-sm font-medium hover:bg-red-500/20 transition border border-red-500/20">
                                    🗑 Delete
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        } catch (e) {
            serverList.innerHTML = `
                <div class="rounded-2xl bg-red-500/10 p-6 text-center border border-red-500/20">
                    <p class="text-red-400">Failed to load servers. Please refresh.</p>
                </div>
            `;
        }
    }

    // Handle server actions (start/stop/restart/delete)
    serverList.addEventListener('click', async (e) => {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        
        if (action === 'delete') {
            if (!confirm(`Are you sure you want to delete this server? This cannot be undone.`)) return;
            
            try {
                const res = await fetch(`/api/servers/${id}`, { method: 'DELETE' });
                const data = await res.json().catch(() => ({}));
                if (data.success) {
                    await loadServers();
                } else {
                    alert('Failed to delete server: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                alert('Error deleting server: ' + err.message);
            }
            return;
        }

        try {
            const res = await fetch(`/api/servers/${id}/power/${action}`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                await loadServers();
            } else {
                alert('Failed to ' + action + ' server: ' + (data.error || 'Unknown error'));
            }
        } catch (err) {
            alert('Error: ' + err.message);
        }
    });

    // Create server
    createForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!linkedToPtero) {
            formMessage.textContent = '❌ Your panel account is not linked yet. Please fix the account setup first.';
            formMessage.className = 'mt-3 text-sm text-red-400';
            return;
        }

        formMessage.textContent = '⏳ Creating server...';
        formMessage.className = 'mt-3 text-sm text-slate-400';
        
        const cpuInput = Number(document.getElementById('cpu').value) || 25;
        const payload = {
            name: document.getElementById('serverName').value.trim(),
            egg: Number(document.getElementById('egg').value),
            cpu: Math.min(25, Math.max(1, cpuInput)),
            memory: Math.max(512, Number(document.getElementById('memory').value) || 1024),
            disk: Math.max(1024, Number(document.getElementById('disk').value) || 2048),
            startupFile: document.getElementById('startupFile').value.trim(),
            startupCommand: document.getElementById('startupCommand').value.trim()
        };

        if (!payload.name) {
            formMessage.textContent = '⚠️ Please enter a server name.';
            formMessage.className = 'mt-3 text-sm text-amber-400';
            return;
        }

        try {
            const res = await fetch('/api/servers/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json().catch(() => ({}));
            
            if (data.success) {
                formMessage.textContent = '✅ ' + (data.message || 'Server created successfully!');
                formMessage.className = 'mt-3 text-sm text-emerald-400';
                createForm.reset();
                document.getElementById('cpu').value = 25;
                document.getElementById('memory').value = 1024;
                document.getElementById('disk').value = 2048;
                document.getElementById('startupFile').value = '';
                document.getElementById('startupCommand').value = '';
                await loadEggOptions();
                await loadServers();
            } else {
                formMessage.textContent = '❌ ' + (data.error || 'Failed to create server.');
                formMessage.className = 'mt-3 text-sm text-red-400';
            }
        } catch (err) {
            formMessage.textContent = '❌ Error: ' + err.message;
            formMessage.className = 'mt-3 text-sm text-red-400';
        }
    });

    // Refresh button
    document.getElementById('refreshBtn').addEventListener('click', () => {
        loadUser();
        loadServers();
    });

    eggSelect.addEventListener('change', updateStartupHints);

    // Initial load
    loadUser();
    loadEggOptions();
    loadServers();

    // Auto-refresh every 30 seconds
    setInterval(loadServers, 30000);
</script>

</body>
</html>
